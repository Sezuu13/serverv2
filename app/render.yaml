services:
  - type: web
    name: fsl-prediction-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
